name: Camera Obor FULL AUTOMATED 24/7

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: sudo apt update && sudo apt install -y ffmpeg jq fonts-dejavu curl bc

      - name: Get Real Subs and Calculate Bar
        id: subs
        run: |
          RESPONSE=$(curl -s "https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${{ secrets.CHANNEL_ID }}&key=${{ secrets.YOUTUBE_API_KEY }}")
          SUBS=$(echo $RESPONSE | jq -r '.items[0].statistics.subscriberCount')
          TARGET=1000
          PERCENT=$(echo "scale=2; $SUBS / $TARGET" | bc)
          if (( $(echo "$PERCENT > 1.0" | bc -l) )); then PERCENT=1.0; fi
          echo "subs_count=$SUBS" >> $GITHUB_OUTPUT
          echo "target_count=$TARGET" >> $GITHUB_OUTPUT
          echo "percent=$PERCENT" >> $GITHUB_OUTPUT

      - name: Start Streaming with Live Auto-Bar
        run: |
          ffmpeg -hide_banner -loglevel error \
          -rtsp_transport tcp \
          -analyzeduration 100M -probesize 100M \
          -re -i "${{ secrets.RTSP_URL }}" \
          -vf "drawbox=x=0:y=ih-100:w=iw:h=100:color=black@0.5:t=fill, \
               drawbox=x=150:y=ih-65:w=iw-300:h=35:color=white@0.2:t=fill, \
               drawbox=x=150:y=ih-65:w=(iw-300)*${{ steps.subs.outputs.percent }}:h=35:color=red@0.9:t=fill, \
               drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='ABONATI\: ${{ steps.subs.outputs.subs_count }} / ${{ steps.subs.outputs.target_count }}':x=(w-text_w)/2:y=h-60:fontsize=28:fontcolor=white:shadowcolor=black:shadowx=2:shadowy=2, \
               drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf:text='LIVE CAMERA OBOR':x=150:y=h-90:fontsize=20:fontcolor=yellow" \
          -vcodec libx264 -preset veryfast -b:v 3500k -maxrate 3500k -bufsize 7000k -pix_fmt yuv420p \
          -acodec aac -ab 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_KEY }}"
