name: Camera Obor FULL-HD PRO 24/7

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'   # 09:00 Romania
    - cron: '0 12 * * *'  # 15:00 Romania
    - cron: '0 18 * * *'  # 21:00 Romania
    - cron: '0 0 * * *'   # 03:00 Romania

concurrency:
  group: camera-stream
  cancel-in-progress: true

jobs:
  run-stream:
    runs-on: ubuntu-latest
    timeout-minutes: 375  # 6h15min - safety net la nivel de job

    steps:

      # ------------------------------------------------------------------ #
      # 1. Checkout repo
      # ------------------------------------------------------------------ #
      - name: Checkout Code
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Instaleaza ffmpeg si unelte
      # ------------------------------------------------------------------ #
      - name: Install Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg bc jq curl

      # ------------------------------------------------------------------ #
      # 3. Citeste numarul de abonati (foloseste API Key, NU OAuth)
      # ------------------------------------------------------------------ #
      - name: Get Subscriber Count
        id: subs
        run: |
          echo "=== Citesc abonati canal ==="
          RESPONSE=$(curl -s \
            "https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${{ secrets.CHANNEL_ID }}&key=${{ secrets.YOUTUBE_API_KEY }}")

          SUBS=$(echo "$RESPONSE" | jq -r '.items[0].statistics.subscriberCount // "0"')
          echo "Abonati gasiti: $SUBS"

          TARGET=1000
          if [ "$SUBS" -eq 0 ]; then
            PERCENT_INT=0
          else
            PERCENT_INT=$(( (SUBS * 100) / TARGET ))
          fi

          if [ "$PERCENT_INT" -gt 100 ]; then PERCENT_INT=100; fi

          echo "Progres spre 1000: $SUBS / $TARGET ($PERCENT_INT%)"
          echo "subs=$SUBS" >> $GITHUB_OUTPUT
          echo "percent_int=$PERCENT_INT" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------------ #
      # 4. STREAM - ffmpeg ruleaza exact 5h50min (21000 secunde)
      #    - Input 0: camera RTSP
      #    - Input 1: video.mp4 (animatie subscribe green screen)
      #    - Input 2: playlist.txt (muzica lounge)
      #    Dupa 21000 secunde ffmpeg se opreste singur.
      #    YouTube inchide live-ul automat cand nu mai primeste date.
      #    La urmatorul cron (6 ore mai tarziu) un nou stream porneste.
      # ------------------------------------------------------------------ #
      - name: Start Streaming (5h50min)
        run: |
          echo "=== START STREAM - $(date -u) ==="
          echo "Abonati: ${{ steps.subs.outputs.subs }} / 1000"

          timeout 21000 ffmpeg \
            -hide_banner \
            -loglevel error \
            -rtsp_transport tcp \
            -i "${{ secrets.RTSP_URL }}" \
            -stream_loop -1 \
            -i "video.mp4" \
            -stream_loop -1 \
            -f concat -safe 0 \
            -i "playlist.txt" \
            -filter_complex \
              "[1:v]colorkey=0x00FF00:0.3:0.1[subscribe_overlay]; \
               [0:v]scale=1920:1080,format=yuv420p[cam]; \
               [cam][subscribe_overlay]overlay=W-w-30:H-h-30[final]; \
               [2:a]volume=0.35[music_out]" \
            -map "[final]" \
            -map "[music_out]" \
            -c:v libx264 \
            -preset veryfast \
            -tune zerolatency \
            -b:v 4500k \
            -maxrate 4500k \
            -bufsize 9000k \
            -g 60 \
            -c:a aac \
            -b:a 128k \
            -ar 44100 \
            -f flv \
            "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_KEY }}" || true

          echo "=== STREAM OPRIT - $(date -u) ==="

      # ------------------------------------------------------------------ #
      # 5. Asteapta 10 minute inainte ca urmatorul cron sa preia
      #    (buffer intre sesiuni - YouTube are nevoie de ~30-60s oricum)
      # ------------------------------------------------------------------ #
      - name: Pauza 10 minute intre sesiuni
        run: |
          echo "Pauza 10 minute... urmatoarea sesiune porneste la urmatorul cron."
          sleep 600

      # ------------------------------------------------------------------ #
      # 6. Commit gol ca sa tina repo-ul activ (GitHub dezactiveaza
      #    Actions pe repo-uri inactive 60 zile)
      # ------------------------------------------------------------------ #
      - name: Keep Repository Active
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions"
          git commit --allow-empty -m "keepalive: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
