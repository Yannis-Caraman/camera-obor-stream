- name: Create Final Short
 run: |
          python3 << 'EOF'
          import os
          import subprocess

          lang = os.environ.get('lang', 'en')
          duration = os.environ.get('duration', '30')
          header = "STIAI CA?" if lang == "ro" else "DID YOU KNOW?"
          font = "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"

          with open("subtitle_filters.txt", "r", encoding="utf-8") as f:
              subtitle_filters = f.read().strip()

          print(f"Subtitle filters length: {len(subtitle_filters)}")
          print(f"Has subtitles: {bool(subtitle_filters)}")

          header_filter = (
              f"[0:v]drawbox=x=0:y=0:w=1080:h=1920:color=black@0.12:t=fill,"
              f"drawtext=fontfile={font}:"
              f"text='{header}':"
              f"x=(w-text_w)/2:"
              f"y=80:"
              f"fontsize=60:"
              f"fontcolor=white:"
              f"borderw=3:"
              f"bordercolor=black"
          )

          if subtitle_filters:
              full_filter = f"{header_filter},{subtitle_filters}[final]"
          else:
              full_filter = f"{header_filter}[final]"

          full_filter += ";[1:a]volume=0.12[music];[2:a]volume=1.0[voice];[music][voice]amix=inputs=2:duration=first:weights=1 5[aout]"

          with open("filter_complex.txt", "w", encoding="utf-8") as f:
              f.write(full_filter)

          print(f"Filter written to filter_complex.txt ({len(full_filter)} chars)")

          cmd = [
              "ffmpeg", "-hide_banner", "-loglevel", "warning",
              "-i", "combined_bg.mp4",
              "-stream_loop", "-1", "-i", "music1.mp3",
              "-i", "voice.mp3",
              "-filter_complex_script", "filter_complex.txt",
              "-map", "[final]", "-map", "[aout]",
              "-t", duration,
              "-c:v", "libx264", "-preset", "veryfast", "-b:v", "6000k", "-pix_fmt", "yuv420p",
              "-c:a", "aac", "-b:a", "192k", "-ar", "44100",
              "-y", "short_output.mp4"
          ]

          print("Running ffmpeg...")
          result = subprocess.run(cmd)
          if result.returncode != 0:
              print("FFmpeg failed!")
              exit(1)
          print("Final short OK!")
          import os as os2
          print(f"Output size: {os2.path.getsize('short_output.mp4')} bytes")
          EOF
