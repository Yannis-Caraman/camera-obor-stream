name: Auto Shorts Bucharest
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 14 * * *'
    - cron: '0 20 * * *'
jobs:
  create-short:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ffmpeg-${{ runner.os }}

      - name: Install Tools
        run: |
          sudo apt update && sudo apt install -y ffmpeg fonts-dejavu bc jq curl python3-pip
          pip3 install edge-tts requests --break-system-packages

      - name: Generate Fact with Gemini
        run: |
          HOUR=$(date +%H)
          if [ "$HOUR" = "08" ]; then LANG="en"; elif [ "$HOUR" = "14" ]; then LANG="ro"; else LANG="en"; fi

          if [ "$LANG" = "en" ]; then
            echo "Generate a unique surprising and lesser known Did you know fact about Bucharest Romania. Each time pick a completely different topic such as history architecture food culture people famous places events legends. Between 40 and 50 words. Start with Did you know that. Return ONLY the fact nothing else no quotes no asterisks." > prompt.txt
            VOICE="en-US-JennyNeural"
            TITLE="Did you know? Bucharest Facts #Shorts"
            DESCRIPTION="Amazing facts about Bucharest Romania! Like and subscribe for daily Bucharest facts! #Bucharest #Romania #DidYouKnow #Shorts #Facts #Travel #Europe #Romanian #BucharestFacts #RomaniaTravel #TravelShorts #Amazing #History #Culture #Tourism #VisitRomania #EasternEurope #Balkans #CityFacts"
          else
            echo "Genereaza un fapt unic surprinzator despre Bucuresti Romania. Alege un subiect diferit cum ar fi istorie arhitectura mancare cultura oameni locuri evenimente. Intre 40 si 50 de cuvinte. Incepe cu Stiai ca. Foloseste diacritice corecte: ă â î ș ț. Returneaza DOAR faptul nimic altceva." > prompt.txt
            VOICE="ro-RO-AlinaNeural"
            TITLE="Stiai ca? Fapte despre Bucuresti #Shorts"
            DESCRIPTION="Fapte uimitoare despre Bucuresti Romania! Da like si aboneaza-te pentru fapte zilnice! #Bucuresti #Romania #StiaiCa #Shorts #Fapte #Travel #Europa #Romanesc #FapteBucuresti #RomaniaTurism #Istorie #Cultura #TurismRomania #EuropaDeEst #OraseFrumoase"
          fi

          PROMPT=$(cat prompt.txt | tr -d '\n' | sed 's/"/\\"/g')

          RESPONSE=$(curl -s "[generativelanguage.googleapis.com](https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${{) secrets.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"contents\":[{\"parts\":[{\"text\":\"$PROMPT\"}]}]}")

          echo "GEMINI RESPONSE: $RESPONSE"

          FACT=$(echo $RESPONSE | jq -r '.candidates[0].content.parts[0].text' | tr -d '\n' | tr -d '"' | sed 's/`//g' | sed 's/\*//g' | cut -c1-300)

          if [ "$FACT" = "null" ] || [ -z "$FACT" ]; then
            echo "Gemini failed!"
            exit 1
          fi

          echo "FACT: $FACT"
          echo "fact=$FACT" >> $GITHUB_ENV
          echo "voice=$VOICE" >> $GITHUB_ENV
          echo "title=$TITLE" >> $GITHUB_ENV
          echo "description=$DESCRIPTION" >> $GITHUB_ENV
          echo "lang=$LANG" >> $GITHUB_ENV

      - name: Generate Voiceover with Word Timestamps
        run: |
          python3 << 'EOF'
          import asyncio
          import edge_tts
          import os
          import json

          fact = os.environ.get('fact', '')
          voice = os.environ.get('voice', 'en-US-JennyNeural')

          async def main():
              tts = edge_tts.Communicate(fact, voice)
              words = []
              audio_chunks = []

              async for chunk in tts.stream():
                  if chunk["type"] == "audio":
                      audio_chunks.append(chunk["data"])
                  elif chunk["type"] == "WordBoundary":
                      words.append({
                          "word": chunk["text"],
                          "start": chunk["offset"] / 10000000,
                          "duration": chunk["duration"] / 10000000
                      })

              with open("voice.mp3", "wb") as f:
                  for chunk in audio_chunks:
                      f.write(chunk)

              with open("words.json", "w") as f:
                  json.dump(words, f)

              print(f"Generated {len(words)} word timestamps")
              
              # Debug - arată primele câteva cuvinte
              for w in words[:5]:
                  print(f"  {w['word']}: {w['start']:.2f}s - {w['start'] + w['duration']:.2f}s")

          asyncio.run(main())
          EOF

      - name: Build Subtitle Filters
        run: |
          python3 << 'EOF'
          import json
          import re

          with open("words.json") as f:
              words = json.load(f)

          if not words:
              print("AVERTISMENT: Nu s-au găsit cuvinte în words.json!")
              with open("subtitle_filters.txt", "w") as f:
                  f.write("")
              exit(0)

          groups = []
          i = 0
          while i < len(words):
              group_words = words[i:i+3]
              text = " ".join(w["word"] for w in group_words)
              start = group_words[0]["start"]
              end = group_words[-1]["start"] + group_words[-1]["duration"] + 0.15
              groups.append({"text": text, "start": start, "end": end})
              i += 3

          filters = []
          for g in groups:
              # Curăță textul pentru ffmpeg - elimină toate caracterele problematice
              text = g["text"]
              # Elimină caractere care pot strica ffmpeg filter
              text = re.sub(r"[\\'\";:,\[\](){}]", "", text)
              # Înlocuiește apostrof cu spațiu
              text = text.replace("'", " ")
              # Elimină spații multiple
              text = re.sub(r'\s+', ' ', text).strip()
              
              if not text:
                  continue

              start = g["start"]
              end = g["end"]

              f_str = (
                  f"drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:"
                  f"text='{text}':"
                  f"x=(w-text_w)/2:"
                  f"y=h-250:"
                  f"fontsize=70:"
                  f"fontcolor=yellow:"
                  f"borderw=4:"
                  f"bordercolor=black:"
                  f"enable='between(t\\,{start:.3f}\\,{end:.3f})'"
              )
              filters.append(f_str)

          with open("subtitle_filters.txt", "w") as f:
              f.write(",".join(filters))

          print(f"Generated {len(filters)} subtitle filters")
          
          # Debug - arată primele 3 filtre
          for filt in filters[:3]:
              print(f"  {filt[:100]}...")
          EOF

      - name: Download Videos from Pixabay
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import random
          import os
          import sys

          api_key = os.environ.get('PIXABAY_API_KEY', '')
          if not api_key:
              print("EROARE: PIXABAY_API_KEY lipsește!")
              sys.exit(1)

          queries = [
              "bucharest city", "colorful street market", "food cooking fire",
              "crowd festival colorful", "city lights colorful", "street food",
              "vibrant market", "romania traditional", "bucharest architecture",
              "happy people city"
          ]

          random.shuffle(queries)

          videos = []
          headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'}

          for query in queries:
              if len(videos) >= 6:
                  break
              url = f"[pixabay.com](https://pixabay.com/api/videos/?key={api_key}&q={query.replace()' ', '+')}&per_page=10&min_duration=3"
              try:
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req) as r:
                      data = json.loads(r.read())
                      hits = data.get("hits", [])
                      if hits:
                          pick = random.choice(hits)
                          videos.append(pick)
                          print(f"Găsit: {pick['tags'][:50]}")
              except Exception as e:
                  print(f"Eroare la căutarea '{query}': {e}")

          if not videos:
              print("EROARE: Nu s-a putut găsi niciun video pe Pixabay!")
              sys.exit(1)

          downloaded = 0
          for i, video in enumerate(videos[:6]):
              try:
                  video_url = video["videos"]["medium"]["url"]
                  req = urllib.request.Request(video_url, headers=headers)
                  with urllib.request.urlopen(req) as response, open(f"clip{i+1}.mp4", 'wb') as out_file:
                      out_file.write(response.read())
                  print(f"Descărcat clip{i+1}.mp4")
                  downloaded += 1
              except Exception as e:
                  print(f"Eroare la descărcarea clipului {i+1}: {e}")

          if downloaded == 0:
              print("EROARE FATALĂ: Niciun video nu a fost descărcat cu succes!")
              sys.exit(1)
          EOF
        env:
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}

      - name: Get Voice Duration
        run: |
          DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 voice.mp3)
          DURATION_INT=$(echo "$DURATION" | cut -d'.' -f1)
          TOTAL=$((DURATION_INT + 3))
          if [ "$TOTAL" -lt 20 ]; then TOTAL=20; fi
          if [ "$TOTAL" -gt 58 ]; then TOTAL=58; fi
          echo "duration=$TOTAL" >> $GITHUB_ENV
          echo "Video duration: $TOTAL seconds"

      - name: Trim and Prepare Clips
        run: |
          python3 << 'EOF'
          import os
          import subprocess
          import sys

          clips = sorted([f for f in os.listdir('.') if f.startswith('clip') and f.endswith('.mp4')])
          
          if not clips:
              print("EROARE: Nu există clipuri!")
              sys.exit(1)

          duration = int(os.environ.get('duration', 30))
          num_clips = len(clips)
          clip_duration = max(3, duration // num_clips + 1)  # durata per clip

          print(f"Total duration: {duration}s, {num_clips} clips, ~{clip_duration}s each")

          trimmed_clips = []
          for i, clip in enumerate(clips):
              output = f"trimmed_{i+1}.mp4"
              
              # Obține durata clipului original
              result = subprocess.run(
                  ['ffprobe', '-v', 'error', '-show_entries', 'format=duration', 
                   '-of', 'default=noprint_wrappers=1:nokey=1', clip],
                  capture_output=True, text=True
              )
              
              try:
                  original_duration = float(result.stdout.strip())
              except:
                  original_duration = 10
              
              # Calculează un start random pentru varietate
              max_start = max(0, original_duration - clip_duration - 0.5)
              import random
              start_time = random.uniform(0, max_start) if max_start > 0 else 0
              
              # Taie clipul și scalează la 9:16
              cmd = [
                  'ffmpeg', '-hide_banner', '-loglevel', 'error',
                  '-ss', str(start_time),
                  '-i', clip,
                  '-t', str(clip_duration),
                  '-vf', 'scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,setsar=1',
                  '-c:v', 'libx264', '-preset', 'veryfast',
                  '-an',  # fără audio
                  '-y', output
              ]
              
              subprocess.run(cmd, check=True)
              trimmed_clips.append(output)
              print(f"Trimmed {clip} -> {output} (start: {start_time:.1f}s, dur: {clip_duration}s)")

          # Creează lista pentru concat
          with open('clips.txt', 'w') as f:
              for clip in trimmed_clips:
                  f.write(f"file '{clip}'\n")

          print(f"Pregătite {len(trimmed_clips)} clipuri tăiate")
          EOF

      - name: Combine Background Videos
        run: |
          ffmpeg -hide_banner -loglevel warning \
          -f concat -safe 0 -i clips.txt \
          -t ${{ env.duration }} \
          -vf "eq=brightness=0.06:saturation=1.5:contrast=1.08" \
          -c:v libx264 -preset veryfast -an \
          -y combined_bg.mp4
          
          echo "Combined video created:"
          ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 combined_bg.mp4

      - name: Create Final Short
        run: |
          # Citește filtrele de subtitrare
          SUBTITLE_FILTERS=""
          if [ -f "subtitle_filters.txt" ]; then
            SUBTITLE_FILTERS=$(cat subtitle_filters.txt)
          fi

          echo "Subtitle filters length: ${#SUBTITLE_FILTERS}"

          # Header text bazat pe limbă
          if [ "${{ env.lang }}" = "ro" ]; then
            HEADER_TEXT="STIAI CA?"
          else
            HEADER_TEXT="DID YOU KNOW?"
          fi

          # Construiește filter_complex
          if [ -n "$SUBTITLE_FILTERS" ] && [ "$SUBTITLE_FILTERS" != "" ]; then
            echo "Using dynamic subtitles"
            FILTER_COMPLEX="[0:v]drawbox=x=0:y=0:w=1080:h=1920:color=black@0.12:t=fill,drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='${HEADER_TEXT}':x=(w-text_w)/2:y=80:fontsize=60:fontcolor=white:borderw=3:bordercolor=black,${SUBTITLE_FILTERS}[final];[1:a]volume=0.12[music];[2:a]volume=1.0[voice];[music][voice]amix=inputs=2:duration=first:weights=1 5[aout]"
          else
            echo "No subtitles - using header only"
            FILTER_COMPLEX="[0:v]drawbox=x=0:y=0:w=1080:h=1920:color=black@0.12:t=fill,drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='${HEADER_TEXT}':x=(w-text_w)/2:y=80:fontsize=60:fontcolor=white:borderw=3:bordercolor=black[final];[1:a]volume=0.12[music];[2:a]volume=1.0[voice];[music][voice]amix=inputs=2:duration=first:weights=1 5[aout]"
          fi

          ffmpeg -hide_banner -loglevel warning \
          -i combined_bg.mp4 \
          -stream_loop -1 -i music1.mp3 \
          -i voice.mp3 \
          -filter_complex "$FILTER_COMPLEX" \
          -map "[final]" -map "[aout]" \
          -t ${{ env.duration }} \
          -c:v libx264 -preset veryfast -b:v 6000k -pix_fmt yuv420p \
          -c:a aac -b:a 192k -ar 44100 \
          -y short_output.mp4
          
          echo "Final video created!"
          ls -la short_output.mp4

      - name: Get YouTube Access Token
        run: |
          TOKEN_RESPONSE=$(curl -s -X POST [oauth2.googleapis.com](https://oauth2.googleapis.com/token) \
            -d client_id=${{ secrets.YOUTUBE_CLIENT_ID }} \
            -d client_secret=${{ secrets.YOUTUBE_CLIENT_SECRET }} \
            -d refresh_token=${{ secrets.YOUTUBE_REFRESH_TOKEN }} \
            -d grant_type=refresh_token)
          ACCESS_TOKEN=$(echo $TOKEN_RESPONSE | jq -r '.access_token')
          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Upload Short to YouTube
        run: |
          TITLE="${{ env.title }}"
          DESC="${{ env.description }}"
          curl -s -X POST \
          "[googleapis.com](https://www.googleapis.com/upload/youtube/v3/videos?uploadType=multipart&part=snippet,status)" \
          -H "Authorization: Bearer ${{ env.access_token }}" \
          -F "metadata={\"snippet\":{\"title\":\"$TITLE\",\"description\":\"$DESC\",\"tags\":[\"bucharest\",\"romania\",\"didyouknow\",\"shorts\",\"facts\",\"travel\",\"europe\",\"history\",\"culture\"],\"categoryId\":\"27\"},\"status\":{\"privacyStatus\":\"public\",\"selfDeclaredMadeForKids\":false}};type=application/json" \
          -F "video=@short_output.mp4;type=video/mp4"

      - name: Keep Repo Active
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git commit --allow-empty -m "shorts generated $(date)"
          git push
