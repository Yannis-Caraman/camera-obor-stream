name: Auto Shorts Bucharest
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 14 * * *'
    - cron: '0 20 * * *'
jobs:
  create-short:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt update && sudo apt install -y ffmpeg python3-pip curl jq bc fonts-dejavu
          pip3 install edge-tts requests --break-system-packages

      - name: Generate Fact with Gemini
        run: |
          LANGUAGES=("en" "ro" "en")
          HOUR=$(date +%H)
          if [ "$HOUR" = "08" ]; then LANG="en"; elif [ "$HOUR" = "14" ]; then LANG="ro"; else LANG="en"; fi

          if [ "$LANG" = "en" ]; then
            PROMPT="Generate a surprising and interesting 'Did you know?' fact about Bucharest, Romania. Keep it under 40 words. Start with 'Did you know that'. Return ONLY the fact, nothing else."
            VOICE="en-US-JennyNeural"
            TITLE_PREFIX="Did you know? Bucharest Facts"
          else
            PROMPT="Generează un fapt surprinzător despre București, România. Maximum 40 de cuvinte. Începe cu 'Știai că'. Returnează DOAR faptul, nimic altceva."
            VOICE="ro-RO-AlinaNeural"
            TITLE_PREFIX="Știai că? Fapte despre București"
          fi

          RESPONSE=$(curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"contents\":[{\"parts\":[{\"text\":\"$PROMPT\"}]}]}")

          FACT=$(echo $RESPONSE | jq -r '.candidates[0].content.parts[0].text' | tr -d '\n' | sed 's/"/\\"/g')
          echo "fact=$FACT" >> $GITHUB_ENV
          echo "voice=$VOICE" >> $GITHUB_ENV
          echo "title=$TITLE_PREFIX" >> $GITHUB_ENV
          echo "lang=$LANG" >> $GITHUB_ENV

      - name: Generate Voiceover
        run: |
          python3 -c "
          import asyncio
          import edge_tts
          async def main():
              tts = edge_tts.Communicate('${{ env.fact }}', '${{ env.voice }}')
              await tts.save('voice.mp3')
          asyncio.run(main())
          "

      - name: Get Bucharest Video from Pixabay
        run: |
          RESPONSE=$(curl -s "https://pixabay.com/api/videos/?key=${{ secrets.PIXABAY_API_KEY }}&q=bucharest&per_page=20")
          COUNT=$(echo $RESPONSE | jq '.hits | length')
          RANDOM_INDEX=$((RANDOM % COUNT))
          VIDEO_URL=$(echo $RESPONSE | jq -r ".hits[$RANDOM_INDEX].videos.medium.url")
          curl -L "$VIDEO_URL" -o background.mp4
          echo "Downloaded video: $VIDEO_URL"

      - name: Get Voice Duration
        run: |
          DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 voice.mp3)
          DURATION_INT=$(echo "$DURATION" | cut -d'.' -f1)
          TOTAL=$((DURATION_INT + 3))
          echo "duration=$TOTAL" >> $GITHUB_ENV

      - name: Create Short with FFmpeg
        run: |
          ffmpeg -hide_banner -loglevel error \
          -stream_loop -1 -i background.mp4 \
          -i voice.mp3 \
          -filter_complex "\
          [0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,setsar=1[bg]; \
          [bg]drawbox=x=0:y=0:w=1080:h=1920:color=black@0.4:t=fill[dark]; \
          [dark]drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:\
          text='Did you know?':x=(w-text_w)/2:y=200:fontsize=70:fontcolor=white:\
          shadowcolor=black:shadowx=3:shadowy=3, \
          drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf:\
          text='${{ env.fact }}':x=80:y=400:fontsize=45:fontcolor=white:\
          shadowcolor=black:shadowx=2:shadowy=2:\
          fix_bounds=true:line_spacing=15:\
          expansion=none[final]" \
          -map "[final]" -map 1:a \
          -t ${{ env.duration }} \
          -vcodec libx264 -preset veryfast -b:v 5000k -pix_fmt yuv420p \
          -acodec aac -ab 192k -ar 44100 \
          short_output.mp4

      - name: Get YouTube Access Token
        run: |
          RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d client_id=${{ secrets.YOUTUBE_CLIENT_ID }} \
            -d client_secret=${{ secrets.YOUTUBE_CLIENT_SECRET }} \
            -d refresh_token=${{ secrets.YOUTUBE_REFRESH_TOKEN }} \
            -d grant_type=refresh_token)
          ACCESS_TOKEN=$(echo $RESPONSE | jq -r '.access_token')
          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Upload Short to YouTube
        run: |
          DATE=$(date +"%d %B %Y")
          TITLE="${{ env.title }} - $DATE"
          
          curl -s -X POST \
          "https://www.googleapis.com/upload/youtube/v3/videos?uploadType=multipart&part=snippet,status" \
          -H "Authorization: Bearer ${{ env.access_token }}" \
          -F "metadata={\"snippet\":{\"title\":\"$TITLE\",\"description\":\"Interesting facts about Bucharest! #Shorts #Bucharest #Romania #DidYouKnow\",\"tags\":[\"bucharest\",\"romania\",\"didyouknow\",\"shorts\",\"facts\"],\"categoryId\":\"27\"},\"status\":{\"privacyStatus\":\"public\",\"selfDeclaredMadeForKids\":false}};type=application/json" \
          -F "video=@short_output.mp4;type=video/mp4"

      - name: Keep Repo Active
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git commit --allow-empty -m "shorts generated"
          git push
