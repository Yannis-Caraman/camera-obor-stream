- name: Install Tools
        run: |
          sudo apt update && sudo apt install -y ffmpeg fonts-dejavu bc jq curl python3-pip
          pip3 install gtts requests --break-system-packages

      - name: Generate Voiceover with Word Timestamps
        run: |
          python3 - << 'EOF'
          import os
          import json
          import subprocess
          from gtts import gTTS

          with open('tts_text.txt', 'r', encoding='utf-8') as f:
              fact = f.read().strip()

          lang_env = os.environ.get('lang', 'en')
          gtts_lang = 'ro' if lang_env == 'ro' else 'en'

          print(f"Generating TTS for: {fact}")
          print(f"Language: {gtts_lang}")

          # Genereaza audio
          tts = gTTS(text=fact, lang=gtts_lang, slow=False)
          tts.save("voice.mp3")
          print("Audio generated OK")

          # Calculeaza durata audio
          result = subprocess.run(
              ['ffprobe', '-v', 'error', '-show_entries', 'format=duration',
               '-of', 'default=noprint_wrappers=1:nokey=1', 'voice.mp3'],
              capture_output=True, text=True)
          total_dur = float(result.stdout.strip())
          print(f"Audio duration: {total_dur}s")

          # Genereaza timestamps estimati per cuvant
          text_words = fact.split()
          dur_per_word = total_dur / len(text_words)

          words = []
          for i, w in enumerate(text_words):
              words.append({
                  "word": w,
                  "start": round(i * dur_per_word, 3),
                  "duration": round(dur_per_word * 0.85, 3)
              })

          with open("words.json", "w", encoding='utf-8') as f:
              json.dump(words, f, ensure_ascii=False)

          print(f"Generated {len(words)} word timestamps")
          print(f"First word: {words[0]}")
          print(f"Last word: {words[-1]}")
          EOF
