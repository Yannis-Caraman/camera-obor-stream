name: Auto Shorts Bucharest
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 14 * * *'
    - cron: '0 20 * * *'
jobs:
  create-short:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ffmpeg-${{ runner.os }}

      - name: Install Tools
        run: |
          sudo apt update && sudo apt install -y ffmpeg fonts-dejavu bc jq curl
          pip3 install edge-tts requests --break-system-packages

      - name: Generate Fact with Gemini
        run: |
          HOUR=$(date +%H)
          if [ "$HOUR" = "08" ]; then LANG="en"; elif [ "$HOUR" = "14" ]; then LANG="ro"; else LANG="en"; fi

          if [ "$LANG" = "en" ]; then
            PROMPT="Generate a surprising and interesting Did you know fact about Bucharest Romania. Make it detailed and interesting, between 50 and 60 words. Start with Did you know that. Return ONLY the fact, nothing else, no quotes."
            VOICE="en-US-JennyNeural"
            TITLE_PREFIX="Did you know? Bucharest Facts"
          else
            PROMPT="Generează un fapt surprinzător și detaliat despre București România. Între 50 și 60 de cuvinte. Începe cu Știai că. Returnează DOAR faptul, nimic altceva, fără ghilimele."
            VOICE="ro-RO-AlinaNeural"
            TITLE_PREFIX="Știai că? Fapte despre București"
          fi

          RESPONSE=$(curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"contents\":[{\"parts\":[{\"text\":\"$PROMPT\"}]}]}")

          echo "GEMINI RESPONSE: $RESPONSE"

          FACT=$(echo $RESPONSE | jq -r '.candidates[0].content.parts[0].text' | tr -d '\n' | tr -d '"' | tr -d "'" | sed 's/`//g' | cut -c1-300)

          if [ "$FACT" = "null" ] || [ -z "$FACT" ]; then
            FACT="Did you know that Bucharest was once called the Little Paris of the East? In the early 20th century its grand boulevards elegant architecture and vibrant cafe culture drew comparisons to the French capital making it one of Europes most glamorous cities."
          fi

          echo "FACT: $FACT"
          echo "fact=$FACT" >> $GITHUB_ENV
          echo "voice=$VOICE" >> $GITHUB_ENV
          echo "title=$TITLE_PREFIX" >> $GITHUB_ENV
          echo "lang=$LANG" >> $GITHUB_ENV

      - name: Generate Voiceover
        run: |
          python3 << 'EOF'
          import asyncio
          import edge_tts
          import os

          fact = os.environ.get('fact', '')
          voice = os.environ.get('voice', 'en-US-JennyNeural')

          async def main():
              tts = edge_tts.Communicate(fact, voice)
              await tts.save('voice.mp3')
          asyncio.run(main())
          EOF

      - name: Get Bucharest Video from Pixabay
        run: |
          RESPONSE=$(curl -s "https://pixabay.com/api/videos/?key=${{ secrets.PIXABAY_API_KEY }}&q=bucharest+city&per_page=20&min_duration=20")
          COUNT=$(echo $RESPONSE | jq '.hits | length')
          if [ "$COUNT" = "0" ]; then
            RESPONSE=$(curl -s "https://pixabay.com/api/videos/?key=${{ secrets.PIXABAY_API_KEY }}&q=bucharest&per_page=20")
            COUNT=$(echo $RESPONSE | jq '.hits | length')
          fi
          RANDOM_INDEX=$((RANDOM % COUNT))
          VIDEO_URL=$(echo $RESPONSE | jq -r ".hits[$RANDOM_INDEX].videos.medium.url")
          curl -L "$VIDEO_URL" -o background.mp4
          echo "Downloaded video: $VIDEO_URL"

      - name: Get Voice Duration
        run: |
          DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 voice.mp3)
          DURATION_INT=$(echo "$DURATION" | cut -d'.' -f1)
          TOTAL=$((DURATION_INT + 4))
          if [ "$TOTAL" -lt 20 ]; then TOTAL=20; fi
          if [ "$TOTAL" -gt 30 ]; then TOTAL=30; fi
          echo "duration=$TOTAL" >> $GITHUB_ENV
          echo "Video will be $TOTAL seconds long"

      - name: Create Short with FFmpeg
        run: |
          python3 << 'EOF'
          import textwrap
          import os
          fact = os.environ.get('fact', 'Did you know that Bucharest was once called the Little Paris of the East?')
          wrapped = '\n'.join(textwrap.wrap(fact, width=35))
          with open('fact_wrapped.txt', 'w') as f:
              f.write(wrapped)
          EOF

          ffmpeg -hide_banner -loglevel error \
          -stream_loop -1 -i background.mp4 \
          -i voice.mp3 \
          -filter_complex "\
          [0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,setsar=1[bg]; \
          [bg]drawbox=x=0:y=0:w=1080:h=1920:color=black@0.5:t=fill[dark]; \
          [dark]drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:\
          text='Did you know?':x=(w-text_w)/2:y=150:fontsize=75:fontcolor=yellow:\
          shadowcolor=black:shadowx=3:shadowy=3, \
          drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf:\
          textfile=fact_wrapped.txt:x=60:y=350:fontsize=45:fontcolor=white:\
          shadowcolor=black:shadowx=2:shadowy=2:\
          fix_bounds=true:line_spacing=20:\
          expansion=none[final]" \
          -map "[final]" -map 1:a \
          -t ${{ env.duration }} \
          -vcodec libx264 -preset veryfast -b:v 5000k -pix_fmt yuv420p \
          -acodec aac -ab 192k -ar 44100 \
          short_output.mp4

      - name: Get YouTube Access Token
        run: |
          RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d client_id=${{ secrets.YOUTUBE_CLIENT_ID }} \
            -d client_secret=${{ secrets.YOUTUBE_CLIENT_SECRET }} \
            -d refresh_token=${{ secrets.YOUTUBE_REFRESH_TOKEN }} \
            -d grant_type=refresh_token)
          ACCESS_TOKEN=$(echo $RESPONSE | jq -r '.access_token')
          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Upload Short to YouTube
        run: |
          DATE=$(date +"%d %B %Y")
          TITLE="${{ env.title }} - $DATE"
          curl -s -X POST \
          "https://www.googleapis.com/upload/youtube/v3/videos?uploadType=multipart&part=snippet,status" \
          -H "Authorization: Bearer ${{ env.access_token }}" \
          -F "metadata={\"snippet\":{\"title\":\"$TITLE\",\"description\":\"Interesting facts about Bucharest! #Shorts #Bucharest #Romania #DidYouKnow\",\"tags\":[\"bucharest\",\"romania\",\"didyouknow\",\"shorts\",\"facts\"],\"categoryId\":\"27\"},\"status\":{\"privacyStatus\":\"public\",\"selfDeclaredMadeForKids\":false}};type=application/json" \
          -F "video=@short_output.mp4;type=video/mp4"

      - name: Keep Repo Active
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git commit --allow-empty -m "shorts generated"
          git push
