name: Auto Shorts Bucharest
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 14 * * *'
    - cron: '0 20 * * *'
jobs:
  create-short:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ffmpeg-${{ runner.os }}

      - name: Install Tools
        run: |
          sudo apt update && sudo apt install -y ffmpeg fonts-dejavu bc jq curl python3-pip
          pip3 install edge-tts requests --break-system-packages

      - name: Generate Fact with Gemini
        run: |
          HOUR=$(date +%H)
          if [ "$HOUR" = "08" ]; then LANG="en"; elif [ "$HOUR" = "14" ]; then LANG="ro"; else LANG="en"; fi

          if [ "$LANG" = "en" ]; then
            VOICE="en-US-JennyNeural"
            TITLE="Did you know? Bucharest Facts #Shorts"
            PROMPT="Generate a unique surprising Did you know fact about Bucharest Romania. Pick a different topic each time: history architecture food culture people famous places events legends. Between 40 and 50 words. Start with Did you know that. Return ONLY the fact no quotes no asterisks no apostrophes use full words instead."
          else
            VOICE="ro-RO-EmilNeural"
            TITLE="Stiai ca? Fapte despre Bucuresti #Shorts"
            PROMPT="Genereaza un fapt unic surprinzator despre Bucuresti Romania. Subiect diferit de fiecare data: istorie arhitectura mancare cultura oameni locuri evenimente. Intre 40 si 50 de cuvinte. Incepe cu Stiai ca. Foloseste diacritice corecte: ă â î ș ț. Nu folosi apostrofuri. Returneaza
