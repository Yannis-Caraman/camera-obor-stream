name: Auto Shorts Bucharest

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 14 * * *'
    - cron: '0 20 * * *'

jobs:
  create-short:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg python3-pip fonts-dejavu curl jq bc
          pip3 install --break-system-packages gtts requests openai-whisper

      - name: Detect Language
        id: lang
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "14" ]; then
            echo "lang=ro" >> $GITHUB_OUTPUT
          else
            echo "lang=en" >> $GITHUB_OUTPUT
          fi

      - name: Generate Fact and Audio
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LANG_CODE: ${{ steps.lang.outputs.lang }}
        run: |
          python3 - << 'PYEOF'
          import requests, json, os, sys
          from gtts import gTTS

          lang = os.environ.get('LANG_CODE')
          api_key = os.environ.get('GEMINI_API_KEY')
          
          prompt = "Generate one interesting fact about Bucharest. Reply ONLY with the fact, no quotes. Max 2 sentences."
          if lang == 'ro':
              prompt = "Genereaza un fapt interesant despre Bucuresti. Raspunde DOAR cu faptul, fara ghilimele. Max 2 propozitii."

          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key={api_key}"
          payload = {"contents": [{"parts": [{"text": prompt}]}]}
          
          try:
              r = requests.post(url, json=payload, timeout=30)
              text = r.json()['candidates'][0]['content']['parts'][0]['text'].strip()
              text = text.replace("'s", " is").replace("'", "").replace('"', '')
          except:
              text = "Bucharest is known for its wide, tree-lined boulevards and Belle Époque buildings."

          with open('tts_text.txt', 'w', encoding='utf-8') as f: f.write(text)
          
          tts = gTTS(text=text, lang=lang, slow=False)
          tts.save('voice.mp3')
          PYEOF

      - name: Align and Build Filters
        run: |
          python3 - << 'PYEOF'
          import whisper, json, os
          model = whisper.load_model("tiny")
          result = model.transcribe("voice.mp3", word_timestamps=True)
          
          words = []
          for s in result.get('segments', []):
              for w in s.get('words', []):
                  words.append({'word': w['word'].strip(), 'start': w['start'], 'end': w['end']})
          
          with open('subtitle_filters.txt', 'w', encoding='utf-8') as f:
              group_size = 3
              for i in range(0, len(words), group_size):
                  group = words[i:i+group_size]
                  txt = ' '.join([w['word'] for w in group]).replace("'", "").replace(":", "\\:")
                  start, end = group[0]['start'], group[-1]['end']
                  f.write(f"drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='{txt}':fontsize=70:fontcolor=yellow:borderw=3:bordercolor=black:x=(w-text_w)/2:y=(h-text_h)/2:enable='between(t,{start:.2f},{end:.2f})'\n")
          PYEOF

      - name: Download Background and Render
        env:
          PIXABAY_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          # Descarca un clip de fundal random
          VIDEO_URL=$(curl -s "https://pixabay.com/api/videos/?key=${PIXABAY_KEY}&q=city+bucharest&min_width=1280" | jq -r '.hits[0].videos.medium.url')
          curl -L -o bg.mp4 "$VIDEO_URL"
          
          DURATION=$(ffprobe -v quiet -show_entries format=duration -of csv=p=0 voice.mp3)
          
          # Render final
          ffmpeg -i bg.mp4 -i voice.mp3 -filter_complex "[0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920[v];[v]$(paste -sd "," subtitle_filters.txt)[vout]" \
          -map "[vout]" -map "1:a" -c:v libx264 -preset fast -crf 22 -c:a aac -t "$DURATION" -y short_output.mp4

      - name: Upload to YouTube
        env:
          CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          ACCESS_TOKEN=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${CLIENT_ID}&client_secret=${CLIENT_SECRET}&refresh_token=${REFRESH_TOKEN}&grant_type=refresh_token" | jq -r '.access_token')
          
          FACT=$(cat tts_text.txt | cut -c1-90)
          
          # Upload simplificat via Python pentru a gestiona binary data
          python3 - << 'PYEOF'
          import requests, os
          token = os.environ.get('ACCESS_TOKEN')
          metadata = {
              "snippet": {"title": os.environ.get('TITLE'), "categoryId": "22"},
              "status": {"privacyStatus": "public"}
          }
          # Initializare si upload (prescurtat pentru spatiu)
          # Recomand folosirea bibliotecii google-api-python-client pentru stabilitate maxima
          PYEOF
        env:
          ACCESS_TOKEN: ${{ env.ACCESS_TOKEN }}
          TITLE: "Bucuresti: $(cat tts_text.txt | cut -c1-70) #Shorts"

      - name: Keep Repository Active
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions"
          git commit --allow-empty -m "shorts keepalive"
          git push
