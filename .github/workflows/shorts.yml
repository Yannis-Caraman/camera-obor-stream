name: Auto Shorts Bucharest
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 14 * * *'
    - cron: '0 20 * * *'
jobs:
  create-short:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ffmpeg-${{ runner.os }}

      - name: Install Tools
        run: |
          sudo apt update && sudo apt install -y ffmpeg fonts-dejavu bc jq curl python3-pip
          pip3 install edge-tts requests --break-system-packages

      - name: Generate Fact with Gemini
        run: |
          HOUR=$(date +%H)
          if [ "$HOUR" = "08" ]; then LANG="en"; elif [ "$HOUR" = "14" ]; then LANG="ro"; else LANG="en"; fi

          echo "lang=$LANG" >> $GITHUB_ENV

          if [ "$LANG" = "en" ]; then
            echo "voice=en-US-JennyNeural" >> $GITHUB_ENV
            echo "title=Did you know? Bucharest Facts #Shorts" >> $GITHUB_ENV
            printf '%s' "Generate a unique surprising Did you know fact about Bucharest Romania. Pick a different topic each time: history architecture food culture people famous places events legends. Between 40 and 50 words. Start with Did you know that. Return ONLY the fact no quotes no asterisks no apostrophes use full words instead." > prompt.txt
          else
            echo "voice=ro-RO-EmilNeural" >> $GITHUB_ENV
            echo "title=Stiai ca? Fapte despre Bucuresti #Shorts" >> $GITHUB_ENV
            printf '%s' "Genereaza un fapt unic surprinzator despre Bucuresti Romania. Subiect diferit de fiecare data: istorie arhitectura mancare cultura oameni locuri evenimente. Intre 40 si 50 de cuvinte. Incepe cu Stiai ca. Foloseste diacritice corecte. Nu folosi apostrofuri. Returneaza DOAR faptul." > prompt.txt
          fi

          PROMPT=$(cat prompt.txt | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))" | tr -d '"')

          curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"contents\":[{\"parts\":[{\"text\":\"$PROMPT\"}]}]}" \
            > gemini_response.json

          cat gemini_response.json

          python3 << 'PYEOF'
          import json, re, os

          with open('gemini_response.json', 'r') as f:
              data = json.load(f)

          fact = data['candidates'][0]['content']['parts'][0]['text']
          fact = fact.strip().replace('\n', ' ')
          fact = re.sub(r'\s+', ' ', fact)
          fact = re.sub(r'[`*]', '', fact)
          fact = fact.replace("\u2019s ", " is ").replace("'s ", " is ")
          fact = fact.replace("\u2019t ", " not ").replace("'t ", " not ")
          fact = fact.replace("\u2019", "").replace("'", "")
          fact = fact[:300]

          if not fact or fact == 'null':
              print("Gemini failed!")
              exit(1)

          with open('tts_text.txt', 'w', encoding='utf-8') as f:
              f.write(fact)

          print(f"Saved fact: {fact}")
          PYEOF

      - name: Generate Voiceover with Word Timestamps
        run: |
          python3 << 'EOF'
          import asyncio
          import edge_tts
          import os
          import json

          with open('tts_text.txt', 'r', encoding='utf-8') as f:
              fact = f.read().strip()

          voice = os.environ.get('voice', 'en-US-JennyNeural')

          print(f"Generating TTS for: {fact}")
          print(f"Voice: {voice}")

          async def main():
              tts = edge_tts.Communicate(fact, voice)
              words = []
              audio_chunks = []

              async for chunk in tts.stream():
                  if chunk["type"] == "audio":
                      audio_chunks.append(chunk["data"])
                  elif chunk["type"] == "WordBoundary":
                      words.append({
                          "word": chunk["text"],
                          "start": chunk["offset"] / 10000000,
                          "duration": chunk["duration"] / 10000000
                      })

              if not audio_chunks:
                  print("ERROR: No audio generated!")
                  exit(1)

              with open("voice.mp3", "wb") as f:
                  for chunk in audio_chunks:
                      f.write(chunk)

              with open("words.json", "w", encoding='utf-8') as f:
                  json.dump(words, f, ensure_ascii=False)

              print(f"Generated {len(words)} word timestamps")
              if words:
                  print(f"First word: {words[0]}")
                  print(f"Last word: {words[-1]}")

          asyncio.run(main())
          EOF

      - name: Build Subtitle Filters
        run: |
          python3 << 'EOF'
          import json
          import re

          with open("words.json", encoding='utf-8') as f:
              words = json.load(f)

          print(f"Total words: {len(words)}")

          if not words:
              print("WARNING: No words - subtitles will be empty!")
              with open("subtitle_filters.txt", "w") as f:
                  f.write("")
              exit(0)

          font = "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          filters = []

          i = 0
          while i < len(words):
              group = words[i:i+3]

              text = " ".join(w["word"] for w in group).upper()
              text = re.sub(r"[\\'\"`~!@#$%^&*()+=\[\]{};:<>?/|]", "", text)
              text = re.sub(r',', '', text)
              text = re.sub(r'\.+$', '', text)
              text = re.sub(r'\s+', ' ', text).strip()

              if not text:
                  i += 3
                  continue

              start = group[0]["start"]
              end = group[-1]["start"] + group[-1]["duration"] + 0.1

              f_str = (
                  f"drawtext=fontfile={font}:"
                  f"text='{text}':"
                  f"x=(w-text_w)/2:"
                  f"y=h-200:"
                  f"fontsize=80:"
                  f"fontcolor=yellow:"
                  f"borderw=5:"
                  f"bordercolor=black:"
                  f"enable='between(t\\,{start:.3f}\\,{end:.3f})'"
              )
              filters.append(f_str)
              i += 3

          with open("subtitle_filters.txt", "w", encoding='utf-8') as f:
              f.write(",".join(filters))

          print(f"Generated {len(filters)} subtitle groups")
          if filters:
              print(f"First filter preview: {filters[0][:100]}...")
          EOF

      - name: Download and Prepare Videos
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import random
          import os
          import subprocess
          import sys

          api_key = os.environ.get('PIXABAY_API_KEY', '')
          duration = int(os.environ.get('duration', 30))

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          }

          queries = [
              "bucharest city",
              "colorful street market",
              "food cooking fire",
              "crowd festival colorful",
              "city lights colorful",
              "street food",
              "vibrant market",
              "romania traditional",
              "bucharest architecture",
              "happy people city"
          ]

          random.shuffle(queries)

          videos = []
          for query in queries:
              if len(videos) >= 6:
                  break
              url = f"https://pixabay.com/api/videos/?key={api_key}&q={query.replace(' ', '+')}&per_page=10&min_duration=3"
              try:
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req, timeout=15) as r:
                      data = json.loads(r.read())
                      hits = data.get("hits", [])
                      if hits:
                          pick = random.choice(hits)
                          videos.append(pick)
                          print(f"Found: {pick['tags'][:50]}")
              except Exception as e:
                  print(f"Error: {e}")

          if not videos:
              print("No videos found!")
              sys.exit(1)

          downloaded = []
          for i, video in enumerate(videos[:6]):
              try:
                  video_url = video["videos"]["medium"]["url"]
                  raw = f"raw_{i+1}.mp4"
                  req = urllib.request.Request(video_url, headers=headers)
                  with urllib.request.urlopen(req, timeout=60) as response:
                      with open(raw, 'wb') as f:
                          f.write(response.read())
                  print(f"Downloaded {raw}")
                  downloaded.append(raw)
              except Exception as e:
                  print(f"Download error: {e}")

          if not downloaded:
              print("No videos downloaded!")
              sys.exit(1)

          clip_duration = max(3, duration // len(downloaded) + 2)
          trimmed = []

          for i, raw in enumerate(downloaded):
              output = f"clip_{i+1}.mp4"
              result = subprocess.run(
                  ['ffprobe', '-v', 'error', '-show_entries', 'format=duration',
                   '-of', 'default=noprint_wrappers=1:nokey=1', raw],
                  capture_output=True, text=True)
              try:
                  orig_dur = float(result.stdout.strip())
              except:
                  orig_dur = 10

              max_start = max(0, orig_dur - clip_duration - 0.5)
              start_time = random.uniform(0, max_start) if max_start > 0 else 0

              cmd = [
                  'ffmpeg', '-hide_banner', '-loglevel', 'error',
                  '-ss', str(start_time),
                  '-i', raw,
                  '-t', str(clip_duration),
                  '-vf', 'scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,eq=brightness=0.06:saturation=1.5:contrast=1.08,setsar=1',
                  '-c:v', 'libx264', '-preset', 'veryfast', '-an', '-y', output
              ]
              result = subprocess.run(cmd)
              if result.returncode == 0:
                  trimmed.append(output)
                  print(f"Processed {raw} -> {output}")
              else:
                  print(f"Failed to process {raw}")

          if not trimmed:
              print("No clips processed!")
              sys.exit(1)

          with open('clips.txt', 'w') as f:
              for clip in trimmed:
                  f.write(f"file '{clip}'\n")

          print(f"Ready: {len(trimmed)} clips")
          EOF
        env:
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}

      - name: Get Voice Duration
        run: |
          DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 voice.mp3)
          DURATION_INT=$(echo "$DURATION" | cut -d'.' -f1)
          TOTAL=$((DURATION_INT + 3))
          if [ "$TOTAL" -lt 20 ]; then TOTAL=20; fi
          if [ "$TOTAL" -gt 58 ]; then TOTAL=58; fi
          echo "duration=$TOTAL" >> $GITHUB_ENV
          echo "Video duration: $TOTAL seconds"

      - name: Combine Background Videos
        run: |
          ffmpeg -hide_banner -loglevel error \
          -f concat -safe 0 -i clips.txt \
          -t ${{ env.duration }} \
          -c:v libx264 -preset veryfast -an \
          -y combined_bg.mp4
          echo "Combined video OK"

      - name: Create Final Short
        run: |
          SUBTITLE_FILTERS=$(cat subtitle_filters.txt)
          if [ "${{ env.lang }}" = "ro" ]; then
            HEADER="STIAI CA?"
          else
            HEADER="DID YOU KNOW?"
          fi

          if [ -n "$SUBTITLE_FILTERS" ]; then
            FILTER="[0:v]drawbox=x=0:y=0:w=1080:h=1920:color=black@0.12:t=fill,drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='${HEADER}':x=(w-text_w)/2:y=80:fontsize=60:fontcolor=white:borderw=3:bordercolor=black,${SUBTITLE_FILTERS}[final];[1:a]volume=0.12[music];[2:a]volume=1.0[voice];[music][voice]amix=inputs=2:duration=first:weights=1 5[aout]"
          else
            FILTER="[0:v]drawbox=x=0:y=0:w=1080:h=1920:color=black@0.12:t=fill,drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='${HEADER}':x=(w-text_w)/2:y=80:fontsize=60:fontcolor=white:borderw=3:bordercolor=black[final];[1:a]volume=0.12[music];[2:a]volume=1.0[voice];[music][voice]amix=inputs=2:duration=first:weights=1 5[aout]"
          fi

          ffmpeg -hide_banner -loglevel error \
          -i combined_bg.mp4 \
          -stream_loop -1 -i music1.mp3 \
          -i voice.mp3 \
          -filter_complex "$FILTER" \
          -map "[final]" -map "[aout]" \
          -t ${{ env.duration }} \
          -c:v libx264 -preset veryfast -b:v 6000k -pix_fmt yuv420p \
          -c:a aac -b:a 192k -ar 44100 \
          -y short_output.mp4
          echo "Final short OK"

      - name: Get YouTube Access Token
        run: |
          TOKEN_RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d client_id=${{ secrets.YOUTUBE_CLIENT_ID }} \
            -d client_secret=${{ secrets.YOUTUBE_CLIENT_SECRET }} \
            -d refresh_token=${{ secrets.YOUTUBE_REFRESH_TOKEN }} \
            -d grant_type=refresh_token)
          ACCESS_TOKEN=$(echo $TOKEN_RESPONSE | jq -r '.access_token')
          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Upload Short to YouTube
        run: |
          TITLE="${{ env.title }}"
          curl -s -X POST \
          "https://www.googleapis.com/upload/youtube/v3/videos?uploadType=multipart&part=snippet,status" \
          -H "Authorization: Bearer ${{ env.access_token }}" \
          -F "metadata={\"snippet\":{\"title\":\"$TITLE\",\"description\":\"Amazing facts about Bucharest Romania! #Shorts #Bucharest #Romania #DidYouKnow #Facts #Travel #Europe #History #Culture\",\"tags\":[\"bucharest\",\"romania\",\"didyouknow\",\"shorts\",\"facts\",\"travel\",\"europe\",\"history\",\"culture\"],\"categoryId\":\"27\"},\"status\":{\"privacyStatus\":\"public\",\"selfDeclaredMadeForKids\":false}};type=application/json" \
          -F "video=@short_output.mp4;type=video/mp4"

      - name: Keep Repo Active
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git commit --allow-empty -m "shorts generated $(date)"
          git push
