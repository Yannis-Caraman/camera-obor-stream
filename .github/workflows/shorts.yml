name: Auto Shorts Bucharest
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 14 * * *'
    - cron: '0 20 * * *'
jobs:
  create-short:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ffmpeg-${{ runner.os }}

      - name: Install Tools
        run: |
          sudo apt update && sudo apt install -y ffmpeg fonts-dejavu bc jq curl
          pip3 install edge-tts requests --break-system-packages

      - name: Generate Fact with Gemini
        run: |
          HOUR=$(date +%H)
