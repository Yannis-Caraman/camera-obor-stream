name: Get YouTube Token
on:
  workflow_dispatch:
jobs:
  get-token:
    runs-on: ubuntu-latest
    steps:
      - name: Get Auth URL
        run: |
          echo "Go to this URL in your browser:"
          echo "https://accounts.google.com/o/oauth2/auth?client_id=1027136883356-nl91lj9s047nu5l2snu8he6k1h23j7bq.apps.googleusercontent.com&redirect_uri=http://localhost&scope=https://www.googleapis.com/auth/youtube&response_type=code&access_type=offline&prompt=consent"
