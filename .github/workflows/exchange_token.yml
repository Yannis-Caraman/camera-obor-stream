name: Exchange Token
on:
  workflow_dispatch:
    inputs:
      auth_code:
        description: 'Paste your auth code here'
        required: true
jobs:
  exchange:
    runs-on: ubuntu-latest
    steps:
      - name: Get Refresh Token
        run: |
          curl -X POST https://oauth2.googleapis.com/token \
          -d client_id=1027136883356-u6l5u980ikfpg0anmf3g4a7j0nujugfm.apps.googleusercontent.com \
          -d client_secret=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 \
          -d code=${{ github.event.inputs.auth_code }} \
          -d grant_type=authorization_code \
          -d redirect_uri=http://localhost
